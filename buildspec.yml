version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.12
    commands:
      - echo "Installing Lambda dependencies..."
      - mkdir package
      - pip install -r lambda/requirements.txt -t package

  build:
    commands:
      - echo "Packaging Lambda..."
      - cp lambda/*.py package/
      - cd package
      - zip -r ../function.zip .

artifacts:
  files:
    - function.zip

