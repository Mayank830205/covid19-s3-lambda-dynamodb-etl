version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.12
    commands:
      - echo "Installing dependencies..."
      - mkdir package
      - |
        if [ -f lambda/requirements.txt ]; then
          pip install -r lambda/requirements.txt -t package
        fi

  build:
    commands:
      - echo "Packaging Lambda..."
      - cp -r lambda/* package/
      - cd package
      - zip -r ../function.zip .

artifacts:
  files:
    - function.zip

